services:
  - type: web
    name: tls-v2-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-v2.txt
    startCommand: python -m src.v2.web --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false

  - type: worker
    name: tls-v2-scouts
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-v2.txt
    startCommand: python -m src.v2.run_all
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: V2_DASHBOARD_BASE
        sync: false

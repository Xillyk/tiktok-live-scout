# TikTok Live Scout configuration.
#
# Each profile is a separate logged-in TikTok account with its own
# user_data_dir (cookies) and its own list of targets. On launch, the
# .command shows a picker and you choose which profile to run.

profiles:
  - name: bobabenz1
    user_data_dir: ./data/auth
    targets:
      - paloyzzzz05
      - fon_.17
      - peemwrk

  # Add a second profile by uncommenting and editing. Run `--login` once
  # against the new profile to populate its user_data_dir.
  - name: minasan245
    user_data_dir: ./data/auth_minasan245
    targets:
      - manownongp

  # Add a second profile by uncommenting and editing. Run `--login` once
  # against the new profile to populate its user_data_dir.
  # - name: alt_account
  #   user_data_dir: ./data/auth_alt
  #   targets:
  #     - someone
  #     - someone_else

poll_interval_seconds: 60

# Keep the TikTok browser visible while the scout runs.
# Set to true to hide it. Headless mode may also trigger anti-bot UI from
# TikTok (collapsed Following list, etc.), so headed is generally more
# reliable for detection.
headless: false

# Where the scout writes a screenshot/HTML when something looks off.
debug_dump_dir: ./data/debug

# Where logs go (rolling file).
log_file: ./logs/scout.log

web:
  host: 127.0.0.1
  port: 8766
